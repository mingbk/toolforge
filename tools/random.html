<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机字符串生成器 - ToolForge</title>
<meta name="description" content="在线随机字符串生成器，支持自定义长度、大小写字母、数字和特殊符号。">
<link rel="stylesheet" href="../css/style.css">
<style>
  .char-options { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
  .char-options label { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; font-size: 0.85rem; }
  .length-row { display: flex; align-items: center; gap: 0.75rem; }
  .length-row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .length-row .len-display { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 600; min-width: 2.5rem; text-align: center; }
  #str-output { 
    word-break: break-all; padding: 0.75rem 1rem; background: var(--bg-input);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-family: var(--font-mono); font-size: 0.9rem; min-height: 48px;
    display: flex; align-items: center;
  }
  .lang-switch { font-size: 0.75rem; margin-left: auto; }
  .lang-switch a { color: var(--text-dim); }
</style>
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="logo"><span class="icon">🔧</span> ToolForge</a>
    <nav>
    <a href="../index.html">首页</a>
    <a href="timestamp.html">时间戳</a>
    <a href="json.html">JSON</a>
    <a href="base64.html">编码</a>
    <a href="uuid.html">UUID</a>
    <a href="random.html" class="active">随机</a>
    <a href="aes.html">AES</a>
    <a href="rsa.html">RSA</a>
    <a href="wordcount.html">字数</a>
  </nav>
  <span class="lang-switch"><a href="../en/tools/random.html">EN</a></span>
</header>

<main>

  <div class="tool-header">
    <h1>🎲 随机字符串生成器</h1>
    <p>生成指定长度和字符集的随机字符串。适用于密码、Token、验证码等场景。<br><a href="../guide/random.html" style="font-size:0.85rem;color:var(--text-dim)">📖 crypto.getRandomValues 和 Math.random 有什么区别？阅读教程 →</a></p>
  </div>

  <div class="ad-slot" data-ad-label="广告位 · 工具页顶部"></div>

  <!-- Length -->
  <div class="field">
    <div class="label-row"><label>字符串长度</label></div>
    <div class="length-row">
      <span style="font-size:0.8rem;color:var(--text-dim)">4</span>
      <input type="range" id="len-slider" min="4" max="128" value="16" oninput="updateLen()">
      <span style="font-size:0.8rem;color:var(--text-dim)">128</span>
      <span class="len-display" id="len-display">16</span>
    </div>
  </div>

  <!-- Character set -->
  <div class="field">
    <div class="label-row"><label>字符集</label></div>
    <div class="char-options">
      <label><input type="checkbox" id="opt-upper" checked onchange="generate()"> A-Z 大写字母</label>
      <label><input type="checkbox" id="opt-lower" checked onchange="generate()"> a-z 小写字母</label>
      <label><input type="checkbox" id="opt-digits" checked onchange="generate()"> 0-9 数字</label>
      <label><input type="checkbox" id="opt-special" onchange="generate()"> !@#$% 特殊符号</label>
    </div>
  </div>

  <!-- Generate button -->
  <div class="btn-group" style="margin-bottom:1.25rem">
    <button class="btn btn-accent" onclick="generate()">🎲 生成</button>
    <button class="btn" onclick="copyResult()">📋 复制</button>
  </div>

  <!-- Output -->
  <div class="field">
    <div class="label-row"><label>结果</label></div>
    <div id="str-output">
      <span style="color:var(--text-dim)">点击"生成"按钮</span>
    </div>
  </div>
  <!-- Ad slot: bottom -->
  <div class="ad-slot" data-ad-label="广告位 · 工具页底部"></div>
</main>

<footer>
  <p><strong>ToolForge</strong> — 8 款开发者工具，全部本地运算，数据不出浏览器。</p>
  <p style="margin-top:0.3rem">© 2026 ToolForge · 为效率而生</p>
</footer>

<script src="../js/common.js"></script>
<script>
function updateLen() {
  const v = document.getElementById('len-slider').value;
  document.getElementById('len-display').textContent = v;
  generate();
}
updateLen();

function getCharset() {
  const sets = {
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower: 'abcdefghijklmnopqrstuvwxyz',
    digits: '0123456789',
    special: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };
  let chars = '';
  if (document.getElementById('opt-upper').checked) chars += sets.upper;
  if (document.getElementById('opt-lower').checked) chars += sets.lower;
  if (document.getElementById('opt-digits').checked) chars += sets.digits;
  if (document.getElementById('opt-special').checked) chars += sets.special;
  return chars;
}

function generate() {
  const charset = getCharset();
  const len = parseInt(document.getElementById('len-slider').value);
  const output = document.getElementById('str-output');

  if (!charset) {
    output.innerHTML = '<span style="color:var(--red)">请至少选择一个字符集</span>';
    return;
  }

  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  let result = '';
  for (let i = 0; i < len; i++) {
    result += charset[arr[i] % charset.length];
  }
  output.textContent = result;
}

function copyResult() {
  const text = document.getElementById('str-output').textContent;
  if (text && !text.startsWith('请') && !text.startsWith('点击')) {
    copyToClipboard(text);
  }
}

// Generate initial
generate();
</script>

</body>
</html>
