<main>

  <div class="tool-header">
    <h1>🔒 AES 加解密</h1>
    <p>AES-GCM 256位加密。所有运算在浏览器本地完成，密钥绝不会上传到服务器。<br><a href="../guide/aes.html" style="font-size:0.85rem;color:var(--text-dim)">📖 AES-256-GCM 是什么？什么时候用对称加密？阅读教程 →</a></p>

  <!-- Encrypt tab -->
  <div id="tab-encrypt">
    <div class="field">
      <div class="label-row"><label>密钥 / 密码</label></div>
      <input type="text" id="enc-key" placeholder="输入加密密码（任意长度，建议8位以上）" autocomplete="off">

    <div class="field">

    <div class="btn-group">
      <button class="btn btn-accent" onclick="doEncrypt()">🔐 加密</button>
    </div>

    <div class="field" style="margin-top:1rem">

        <button class="btn btn-sm" onclick="copyToClipboard(document.getElementById('enc-ciphertext').value)">📋 复制</button>

  <!-- Decrypt tab -->
  <div id="tab-decrypt" style="display:none">
    <div class="field">
      <div class="label-row"><label>密钥 / 密码</label></div>
      <input type="text" id="dec-key" placeholder="输入加密时使用的密码" autocomplete="off">
    </div>

    <div class="field">
      <div class="label-row"><label>密文 (Base64)</label></div>

  <div style="margin-top:1.5rem;padding:0.75rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);font-size:0.8rem;color:var(--text-dim)">
    💡 <strong>安全说明：</strong>使用 AES-256-GCM 算法。密文格式为 Base64(IV + 密文)，可直接复制传输。所有加解密运算在您的浏览器中完成，密码不会以任何形式离开您的设备。

<script src="../js/common.js"></script>
<script>
// --- Tab switching ---
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('tab-encrypt').style.display = tab === 'encrypt' ? 'block' : 'none';
  document.getElementById('tab-decrypt').style.display = tab === 'decrypt' ? 'block' : 'none';
}

// --- Key derivation (PBKDF2) ---
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

// --- Encrypt ---
async function doEncrypt() {
  const errorEl = document.getElementById('enc-error');
  const output = document.getElementById('enc-ciphertext');
  errorEl.textContent = '';
  output.value = '';

  const password = document.getElementById('enc-key').value;
  const plaintext = document.getElementById('enc-plaintext').value;
  if (!password) { errorEl.textContent = '请输入密码'; return; }
  if (!plaintext) { errorEl.textContent = '请输入要加密的内容'; return; }

  try {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(password, salt);
    const enc = new TextEncoder();
    const ciphertext = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv }, key, enc.encode(plaintext)
    );

    // Pack: salt(16) + iv(12) + ciphertext
    const packed = new Uint8Array(16 + 12 + ciphertext.byteLength);
    packed.set(salt, 0);
    packed.set(iv, 16);
    packed.set(new Uint8Array(ciphertext), 28);

    output.value = btoa(String.fromCharCode(...packed));
  } catch(e) {
    errorEl.textContent = '加密失败：' + e.message;
  }
}

// --- Decrypt ---
async function doDecrypt() {
  const errorEl = document.getElementById('dec-error');
  const output = document.getElementById('dec-plaintext');
  errorEl.textContent = '';
  output.value = '';

  const password = document.getElementById('dec-key').value;
  const b64Input = document.getElementById('dec-ciphertext').value.trim();
  if (!password) { errorEl.textContent = '请输入密码'; return; }
  if (!b64Input) { errorEl.textContent = '请粘贴密文'; return; }

  try {
    const packed = Uint8Array.from(atob(b64Input), c => c.charCodeAt(0));
    if (packed.length < 28) { errorEl.textContent = '密文格式无效（长度不足）'; return; }

    const salt = packed.slice(0, 16);
    const iv = packed.slice(16, 28);
    const ciphertext = packed.slice(28);

    const key = await deriveKey(password, salt);
    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv }, key, ciphertext
    );

    output.value = new TextDecoder().decode(decrypted);
  } catch(e) {
    errorEl.textContent = '解密失败：密码错误或密文损坏';
  }
}
</script>
