<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID生成器 - ToolForge</title>
<meta name="description" content="在线UUID v4生成器，批量生成唯一标识符，一键复制。">
<link rel="stylesheet" href="../css/style.css">
<style>
  .lang-switch { font-size: 0.75rem; margin-left: auto; }
  .lang-switch a { color: var(--text-dim); }
</style>
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="logo"><span class="icon">🔧</span> ToolForge</a>
    <nav>
    <a href="../index.html">首页</a>
    <a href="timestamp.html">时间戳</a>
    <a href="json.html">JSON</a>
    <a href="base64.html">编码</a>
    <a href="uuid.html" class="active">UUID</a>
    <a href="random.html">随机</a>
    <a href="aes.html">AES</a>
    <a href="rsa.html">RSA</a>
    <a href="wordcount.html">字数</a>
  </nav>
  <span class="lang-switch"><a href="../en/tools/uuid.html">EN</a></span>
</header>

<main>

  <div class="tool-header">
    <h1>🆔 UUID 生成器</h1>
    <p>生成 UUID v4 随机标识符。每次生成都是全球唯一的。<br><a href="../guide/uuid.html" style="font-size:0.85rem;color:var(--text-dim)">📖 使用教程 →</a></p>
  </div>

  <div class="ad-slot" data-ad-label="广告位 · 工具页顶部"></div>

  <div class="field" style="margin-bottom:0.5rem">
    <div class="btn-group">
      <button class="btn btn-accent" onclick="generateOne()">🎲 生成一个</button>
      <button class="btn" onclick="generateBatch(5)">生成 5 个</button>
      <button class="btn" onclick="generateBatch(10)">生成 10 个</button>
      <button class="btn" onclick="generateBatch(20)">生成 20 个</button>
    </div>
    <label style="display:flex;align-items:center;gap:0.5rem;margin-top:0.75rem;cursor:pointer;font-size:0.85rem;color:var(--text-dim)">
      <input type="checkbox" id="dash-toggle" checked onchange="renderList()">
      保留横线 <span style="font-family:var(--font-mono)">-</span>
    </label>
  </div>

  <div class="field" id="result-area">
    <div class="label-row">
      <label>结果</label>
      <button class="btn btn-sm" onclick="copyAll()">📋 复制全部</button>
    </div>
    <div id="uuid-list" style="font-family:var(--font-mono);font-size:0.9rem;color:var(--text-dim)">
      <span style="color:var(--text-dim)">点击上方按钮生成 UUID</span>
    </div>
  </div>
  <!-- Ad slot: bottom -->
  <div class="ad-slot" data-ad-label="广告位 · 工具页底部"></div>
</main>

<footer>
  <p><strong>ToolForge</strong> — 8 款开发者工具，全部本地运算，数据不出浏览器。</p>
  <p style="margin-top:0.3rem">© 2026 ToolForge · 为效率而生</p>
</footer>

<script src="../js/common.js"></script>
<script>
function generateUUID() {
  const uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
  const keepDash = document.getElementById('dash-toggle').checked;
  return keepDash ? uuid : uuid.replace(/-/g, '');
}

let currentUUIDs = [];

function renderList() {
  const el = document.getElementById('uuid-list');
  if (currentUUIDs.length === 0) {
    el.innerHTML = '<span style="color:var(--text-dim)">点击上方按钮生成 UUID</span>';
    return;
  }
  el.innerHTML = currentUUIDs.map((uuid, i) =>
    `<div style="padding:0.5rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <span style="color:var(--green)">${uuid}</span>
      <div style="display:flex;gap:0.25rem">
        <button class="btn btn-sm" onclick="copyToClipboard('${uuid}')">📋</button>
        <button class="btn btn-sm" onclick="copyToClipboard('${uuid.replace(/-/g,'')}')">🔗 去横线复制</button>
      </div>
    </div>`
  ).join('');
}

function generateOne() {
  currentUUIDs = [generateUUID()];
  renderList();
}

function generateBatch(n) {
  currentUUIDs = Array.from({length: n}, () => generateUUID());
  renderList();
}

function copyAll() {
  if (currentUUIDs.length === 0) return;
  copyToClipboard(currentUUIDs.join('\n'));
}
</script>

</body>
</html>
