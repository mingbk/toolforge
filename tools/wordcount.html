<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字数统计 - ToolForge</title>
<meta name="description" content="在线字数统计工具。统计中英文字数、字符数、行数、段落数，实时更新。">
<link rel="stylesheet" href="../css/style.css">
<style>
  .lang-switch { font-size: 0.75rem; margin-left: auto; }
  .lang-switch a { color: var(--text-dim); }
</style>
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="logo"><span class="icon">🔧</span> ToolForge</a>
    <nav>
    <a href="../index.html">首页</a>
    <a href="timestamp.html">时间戳</a>
    <a href="json.html">JSON</a>
    <a href="base64.html">编码</a>
    <a href="uuid.html">UUID</a>
    <a href="random.html">随机</a>
    <a href="aes.html">AES</a>
    <a href="rsa.html">RSA</a>
    <a href="wordcount.html" class="active">字数</a>
  </nav>
  <span class="lang-switch"><a href="../en/tools/wordcount.html">EN</a></span>
</header>

<main>

  <div class="tool-header">
    <h1>📝 字数统计</h1>
    <p>粘贴文本，实时查看字数、字符数、行数和段落数。支持中英文混合统计。<br><a href="../guide/wordcount.html" style="font-size:0.85rem;color:var(--text-dim)">📖 字数统计是什么？阅读教程 →</a></p>
  </div>

  <div class="ad-slot" data-ad-label="广告位 · 工具页顶部"></div>

  <!-- Stats cards -->
  <div class="stats-grid" style="margin-bottom:1.5rem">
    <div class="stat-card">
      <div class="stat-value" id="stat-chars">0</div>
      <div class="stat-label">总字符数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-nospace">0</div>
      <div class="stat-label">字符数（无空格）</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-chinese">0</div>
      <div class="stat-label">中文字数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-words">0</div>
      <div class="stat-label">英文单词数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-lines">0</div>
      <div class="stat-label">行数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-paras">0</div>
      <div class="stat-label">段落数</div>
    </div>
  </div>

  <div class="field">
    <div class="label-row">
      <label>输入文本</label>
      <div class="btn-group">
        <button class="btn btn-sm" onclick="pasteFromClipboard()">📋 粘贴</button>
        <button class="btn btn-sm" onclick="clearText()">🗑 清除</button>
      </div>
    </div>
    <textarea id="text-input" placeholder="在此粘贴或输入文本..." oninput="updateStats()" style="min-height:250px;font-family:var(--font-sans)"></textarea>
  </div>
  <!-- Ad slot: bottom -->
  <div class="ad-slot" data-ad-label="广告位 · 工具页底部"></div>
</main>

<footer>
  <p><strong>ToolForge</strong> — 8 款开发者工具，全部本地运算，数据不出浏览器。</p>
  <p style="margin-top:0.3rem">© 2026 ToolForge · 为效率而生</p>
</footer>

<script src="../js/common.js"></script>
<script>
function updateStats() {
  const text = document.getElementById('text-input').value;

  // Total characters
  document.getElementById('stat-chars').textContent = text.length;

  // Characters without spaces
  const noSpace = text.replace(/\s/g, '').length;
  document.getElementById('stat-nospace').textContent = noSpace;

  // Chinese characters
  const chinese = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g) || []).length;
  document.getElementById('stat-chinese').textContent = chinese;

  // English words (splitting on whitespace, excluding pure Chinese segments)
  const wordCount = text.trim().length > 0
    ? text.trim().split(/\s+/).filter(w => !/^[\u4e00-\u9fff]+$/.test(w)).length
    : 0;
  document.getElementById('stat-words').textContent = wordCount;

  // Lines
  const lines = text.length > 0 ? text.split('\n').length : 0;
  document.getElementById('stat-lines').textContent = lines;

  // Paragraphs (separated by double newlines)
  const paras = text.trim().length > 0
    ? text.trim().split(/\n\s*\n/).filter(p => p.trim().length > 0).length
    : 0;
  document.getElementById('stat-paras').textContent = paras;
}

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('text-input').value = text;
    updateStats();
    showToast('已粘贴');
  } catch {
    showToast('无法访问剪贴板，请手动粘贴');
  }
}

function clearText() {
  document.getElementById('text-input').value = '';
  updateStats();
}
</script>

</body>
</html>
